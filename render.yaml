services:
  # Backend API
  - type: web
    name: lost-found-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        value: file:/app/prisma/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: AI_ENGINE_URL
        value: http://lost-found-ai-engine:8000

  # AI Engine
  - type: web
    name: lost-found-ai-engine
    env: docker
    dockerContext: ./ai-engine
    dockerfilePath: Dockerfile
    plan: free 
    healthCheckPath: /

  # Frontend (Static Site served by Nginx Docker)
  - type: web
    name: lost-found-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://lost-found-backend.onrender.com
    dockerBuildArgs:
      VITE_API_URL: https://lost-found-backend.onrender.com
