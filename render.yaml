services:
  # Backend API
  - type: web
    name: lost-found-backend-pcn
    env: docker
    region: oregon
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        value: file:/app/prisma/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: AI_ENGINE_URL
        value: http://lost-found-ai-engine-pcn:8000

  # AI Engine
  - type: web
    name: lost-found-ai-engine-pcn
    env: docker
    region: oregon
    dockerContext: ./ai-engine
    dockerfilePath: Dockerfile
    plan: free 
    healthCheckPath: /

  # Frontend (Static Site served by Nginx Docker)
  - type: web
    name: lost-found-frontend-pcn
    env: docker
    region: oregon
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    buildArgs:
      - key: VITE_API_URL
        value: https://lost-found-backend-pcn.onrender.com
