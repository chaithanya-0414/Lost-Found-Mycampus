services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=super_secret_jwt_key_123
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - ai-engine

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
